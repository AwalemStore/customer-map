<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>خريطة تغطية الأحياء - المندوب</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg:#f8f7fc; --bg2:#ffffff; --bg3:#f0eff6; --bg4:#e4e2ee;
  --accent:#8377b7; --accent2:#6b5e9e; --accent3:#a99bd4;
  --green:#43a047; --green2:#66bb6a;
  --red:#e53935; --orange:#fb8c00; --yellow:#fdd835;
  --blue:#5c6bc0; --cyan:#00897b;
  --text:#2d2b3d; --text2:#5a5777; --text3:#8e8ba5;
  --border:#ddd8eb; --r:14px; --rs:10px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'IBM Plex Sans Arabic',sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
.wrap{max-width:1440px;margin:0 auto;padding:16px 24px}

/* NAV */
nav{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid var(--border);margin-bottom:20px}
.logo{display:flex;align-items:center;gap:12px}
.logo-ico{display:flex;align-items:center;justify-content:center}
.logo-ico img{height:36px;width:auto;display:block}
.logo h1{font-size:18px;font-weight:700;color:var(--accent2)}
.logo small{font-size:11px;color:var(--text3)}
.live{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text3)}
.live .dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:blinker 2s infinite}
@keyframes blinker{50%{opacity:.3}}

/* KPI ROW */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:24px}
.kpi{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:20px 16px;text-align:center;position:relative;overflow:hidden;transition:.3s;box-shadow:0 2px 8px rgba(131,119,183,.08)}
.kpi:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(131,119,183,.15)}
.kpi::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px}
.kpi:nth-child(1)::after{background:var(--accent)}
.kpi:nth-child(2)::after{background:var(--green)}
.kpi:nth-child(3)::after{background:var(--accent3)}
.kpi:nth-child(4)::after{background:var(--red)}
.kpi:nth-child(5)::after{background:var(--blue)}
.kpi .n{font-size:30px;font-weight:700}
.kpi:nth-child(1) .n{color:var(--accent)}
.kpi:nth-child(2) .n{color:var(--green)}
.kpi:nth-child(3) .n{color:var(--accent3)}
.kpi:nth-child(4) .n{color:var(--red)}
.kpi:nth-child(5) .n{color:var(--blue)}
.kpi .l{font-size:12px;color:var(--text3);margin-top:4px}

/* SECTION */
.sec{margin-bottom:28px}
.sec-h{font-size:20px;font-weight:800;display:flex;align-items:center;gap:10px;margin-bottom:16px}
.sec-h .bar{width:4px;height:24px;border-radius:2px;background:var(--accent)}

.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:0 1px 4px rgba(131,119,183,.06)}
.card-b{padding:20px 24px}

.row2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
canvas{max-height:320px!important}

.fcard{margin-bottom:16px}
.fsearch{padding:14px 18px;border-bottom:1px solid var(--border)}
.fsearch input{width:100%;padding:10px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);color:var(--text);font-family:'IBM Plex Sans Arabic',sans-serif;font-size:14px;outline:none}
.fsearch input:focus{border-color:var(--accent)}
.fcity-row{display:flex;gap:6px;padding:12px 18px;overflow-x:auto;-webkit-overflow-scrolling:touch;border-bottom:1px solid var(--border)}
.fcity-row::-webkit-scrollbar{height:0}
.fchip{padding:7px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:20px;color:var(--text2);font-family:'IBM Plex Sans Arabic',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:.2s;white-space:nowrap}
.fchip:hover{border-color:var(--accent)}
.fchip.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.fchip span{opacity:.6;font-weight:400;font-size:11px}
.fdrops{display:flex;gap:10px;padding:12px 18px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.fdrop{flex:1;min-width:120px}
.fdrop label{display:block;font-size:10px;font-weight:600;color:var(--text3);margin-bottom:4px}
.fdrop select{width:100%;padding:8px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'IBM Plex Sans Arabic',sans-serif;font-size:13px;outline:none;cursor:pointer;appearance:auto}
.fdrop select:focus{border-color:var(--accent)}
.ftags{display:flex;align-items:center;gap:8px;padding:10px 18px;flex-wrap:wrap;background:rgba(131,119,183,.04)}
.ftags-label{font-size:11px;color:var(--text3);font-weight:600}
.atag{display:inline-flex;align-items:center;gap:4px;padding:5px 12px;background:var(--accent);color:#fff;border-radius:16px;font-size:11px;font-weight:500;cursor:pointer;transition:.2s}
.atag:hover{opacity:.8}
.atag b{font-size:13px;margin-right:2px}
.ftags-clear{padding:5px 12px;background:none;border:1px solid var(--red);border-radius:16px;color:var(--red);font-size:11px;font-weight:600;cursor:pointer;font-family:'IBM Plex Sans Arabic',sans-serif}
.rcount{font-size:13px;color:var(--text3);font-weight:400}
.btn-exp{padding:9px 16px;background:var(--accent);border:none;border-radius:6px;color:#fff;font-family:'IBM Plex Sans Arabic',sans-serif;font-size:12px;font-weight:600;cursor:pointer}
.btn-add{padding:9px 16px;background:var(--green);border:none;border-radius:6px;color:#fff;font-family:'IBM Plex Sans Arabic',sans-serif;font-size:12px;font-weight:600;cursor:pointer}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:999;justify-content:center;align-items:center;padding:16px}
.modal-bg.show{display:flex}
.modal{background:var(--bg2);border-radius:var(--r);width:100%;max-width:440px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-h{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid var(--border)}
.modal-h h3{font-size:16px;font-weight:700;color:var(--accent)}
.modal-close{width:32px;height:32px;border-radius:50%;border:none;background:var(--bg3);color:var(--text2);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.modal-b{padding:20px}
.fg{margin-bottom:14px}
.fg label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px}
.fg input,.fg select{width:100%;padding:10px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);color:var(--text);font-family:'IBM Plex Sans Arabic',sans-serif;font-size:14px;outline:none}
.fg input:focus,.fg select:focus{border-color:var(--accent)}
.fg select{appearance:auto}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-actions{display:flex;gap:10px;padding:16px 20px;border-top:1px solid var(--border)}
.modal-actions button{flex:1;padding:12px;border-radius:var(--rs);font-family:'IBM Plex Sans Arabic',sans-serif;font-size:14px;font-weight:600;cursor:pointer;border:none}
.m-cancel{background:var(--bg3);color:var(--text2)}
.m-save{background:var(--accent);color:#fff}
.m-save:hover{opacity:.9}
.badge-new{background:var(--green);color:#fff;font-size:9px;padding:1px 5px;border-radius:8px;margin-right:4px;font-weight:700}
.btn-del{background:none;border:none;color:var(--red);cursor:pointer;font-size:16px;padding:4px;opacity:.5;transition:.2s}
.btn-del:hover{opacity:1}

.dg{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
.dc{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;transition:.3s;cursor:pointer;box-shadow:0 1px 4px rgba(131,119,183,.06)}
.dc:hover{border-color:var(--accent);box-shadow:0 4px 16px rgba(131,119,183,.15)}
.dc.open{grid-column:span 1}
.dh{padding:14px 18px;display:flex;justify-content:space-between;align-items:center}
.dh:hover{background:rgba(131,119,183,.04)}
.dn{font-size:15px;font-weight:700}
.dc-city{font-size:11px;color:var(--text3);margin-top:2px}
.dbadge{min-width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;color:#fff}
.dbar{height:3px;background:var(--bg4);overflow:hidden}
.dbar-f{height:100%;border-radius:2px;transition:width .8s}
.dfoot{display:flex;justify-content:space-around;padding:8px 18px 12px;font-size:11px;color:var(--text3)}
.dfoot .m{font-weight:700}
.dfoot .p{color:var(--green)}
.dfoot .d{color:var(--red)}
.dbody{display:none;border-top:1px solid var(--border);max-height:360px;overflow-y:auto}
.dc.open .dbody{display:block}
.dbody:hover{background:transparent}
.filter-panel{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;margin-bottom:16px;display:none;box-shadow:0 2px 12px rgba(131,119,183,.08)}
.filter-panel.show{display:block}
.filter-clear{display:inline-flex;align-items:center;gap:4px;padding:6px 12px;background:var(--red);color:#fff;border:none;border-radius:6px;font-family:'IBM Plex Sans Arabic',sans-serif;font-size:11px;font-weight:600;cursor:pointer;margin-top:10px}

.si{display:flex;justify-content:space-between;align-items:center;padding:10px 18px;border-bottom:1px solid rgba(221,216,235,.5);font-size:13px;transition:.2s}
.si:hover{background:rgba(131,119,183,.05)}
.si:last-child{border-bottom:none}
.si-l{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
.si-l .nm{font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tb{padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;white-space:nowrap}
.si-r{display:flex;gap:14px;font-size:12px;white-space:nowrap;align-items:center}
.si-r .p{color:var(--green);font-weight:600}
.si-r .d{color:var(--red);font-weight:600}

.t0{background:rgba(131,119,183,.12);color:var(--accent)}
.t1{background:rgba(251,140,0,.12);color:var(--orange)}
.t2{background:rgba(67,160,71,.12);color:var(--green)}
.t3{background:rgba(169,155,212,.12);color:var(--accent3)}
.t4{background:rgba(92,107,192,.12);color:var(--blue)}
.t5{background:rgba(0,137,123,.12);color:var(--cyan)}
.t6{background:rgba(229,57,53,.12);color:var(--red)}
.t7{background:rgba(90,87,119,.12);color:var(--text2)}
.t8{background:rgba(142,139,165,.12);color:var(--text3)}

footer{text-align:center;padding:24px 0;color:var(--text3);font-size:12px;border-top:1px solid var(--border);margin-top:32px}

::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg3)}
::-webkit-scrollbar-thumb{background:var(--accent3);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--accent)}

@media(max-width:768px){
  .wrap{padding:8px 10px}
  .kpis{grid-template-columns:repeat(2,1fr);gap:8px}
  .kpi{padding:14px 10px}
  .kpi .n{font-size:22px}
  .kpi .l{font-size:11px}
  .row2{grid-template-columns:1fr}
  .dg{grid-template-columns:1fr}
  .fdrops{flex-direction:column;gap:8px}
  .fdrop{min-width:100%}
  .fcity-row{padding:10px 12px}
  .sec-h{font-size:16px}
  .dn{font-size:14px}
  nav{flex-wrap:wrap;gap:8px}
  .logo h1{font-size:15px}
  .logo-ico img{height:30px}
  canvas{max-height:260px!important}
}
@media(max-width:480px){
  .wrap{padding:6px 6px}
  .kpis{grid-template-columns:1fr 1fr;gap:6px}
  .kpi .n{font-size:18px}
  .kpi .l{font-size:10px}
  .dg{grid-template-columns:1fr;gap:8px}
  .dc{border-radius:10px}
  .dh{padding:10px 12px}
  .dn{font-size:13px}
  .dbadge{min-width:30px;height:30px;font-size:13px;border-radius:50%}
  .dfoot{font-size:10px;padding:6px 12px 8px}
  .si{padding:8px 12px;font-size:12px;gap:6px}
  .si-l{gap:6px}
  .si-r{gap:8px;font-size:11px}
  .btn-exp{font-size:11px;padding:7px 12px}
  .card-b{padding:14px 12px}
  .sec-h{font-size:14px}
  .live{font-size:10px}
  canvas{max-height:220px!important}
  .ctrls{padding:8px 8px;gap:4px}
  .btn{padding:6px 8px;font-size:10px}
  .srch input{padding:8px 36px 8px 12px;font-size:13px}
}
</style>
</head>

<script>
(function(){

var GH_REPO='AwalemStore/customer-map';

var D = DATA.districts;

var TYPE_MAP = {

};

  'تموينات':'🛒 تموينات','مخبز':'🍞 مخبز','بقالة':'🏪 بقالة','أسواق':'🏬 أسواق',
  'سوبرماركت':'🏷️ سوبرماركت','سوبرماركت مركزي':'🏬 سوبرماركت مركزي','متجر':'🏪 متجر',
  'بلاستيك ومنظفات':'🧴 بلاستيك ومنظفات','شركة / مؤسسة':'🏢 شركة / مؤسسة',
  'خدمات أخرى':'🔧 خدمات أخرى','أخرى':'📌 أخرى'
};
function tc(t){return 't'+(TYPE_MAP[t]||8)}
function fmt(n){return Number(n).toLocaleString('en-US',{maximumFractionDigits:0})}
function fmtM(n){return Number(n).toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0})}
function cln(v){return(!v||v==='nan'||v==='None'||v==='')?'—':v}

var customStores=[];
var ghSha=null;

function mergeCustom(){
  customStores.forEach(function(cs){
    var key=cs.city+'|||'+cs.district;
    if(!D[key])D[key]={city:cs.city,district:cs.district,count:0,paid:0,debit:0,stores:[]};
    var exists=false;
    for(var i=0;i<D[key].stores.length;i++){
      if(D[key].stores[i]._id===cs._id){exists=true;break}
    }
    if(!exists){
      D[key].stores.push({name:cs.name,type:cs.type,phone:cs.phone||'',paid:Number(cs.paid)||0,debit:Number(cs.debit)||0,_custom:true,_id:cs._id});
      D[key].count++;D[key].paid+=Number(cs.paid)||0;D[key].debit+=Number(cs.debit)||0;
      T[cs.type]=(T[cs.type]||0)+1;
    }
  });
}

function loadFromGitHub(){
  fetch(GH_API,{headers:{'Authorization':'token '+GH_TOKEN,'Accept':'application/vnd.github.v3+json'}})
  .then(function(r){return r.json()})
  .then(function(data){
    if(data.content){
      ghSha=data.sha;
      var decoded=atob(data.content.replace(/\n/g,''));
      customStores=JSON.parse(decoded);
      mergeCustom();
      recalcAll();
      render();
      renderKPI();
    }
  })
  .catch(function(){console.log('لا توجد متاجر مضافة بعد');});
}

function saveToGitHub(stores,onDone){
  var content=btoa(unescape(encodeURIComponent(JSON.stringify(stores,null,2))));
  var body={message:'تحديث المتاجر ' + new Date().toLocaleDateString('ar'),content:content};
  if(ghSha)body.sha=ghSha;
  fetch(GH_API,{
    method:'PUT',
    headers:{'Authorization':'token '+GH_TOKEN,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'},
    body:JSON.stringify(body)
  })
  .then(function(r){return r.json()})
  .then(function(data){
    if(data.content)ghSha=data.content.sha;
    if(onDone)onDone();
  })
  .catch(function(err){alert('خطأ في الحفظ: '+err);});
}

var totalStores=0,totalPaid=0,totalDebit=0;
var byCity={};
var maxCnt=0;

function recalcAll(){
  D=JSON.parse(JSON.stringify(DATA.districts));
  T=JSON.parse(JSON.stringify(DATA.types));
  customStores.forEach(function(){});
  mergeCustom();
  totalStores=0;totalPaid=0;totalDebit=0;byCity={};
  var keys=Object.keys(D);
  for(var i=0;i<keys.length;i++){var d=D[keys[i]];totalStores+=d.count;totalPaid+=d.paid;totalDebit+=d.debit;if(!byCity[d.city])byCity[d.city]=[];byCity[d.city].push(d);}
  var cities=Object.keys(byCity);
  cities.sort(function(a,b){return byCity[b].reduce(function(s,x){return s+x.count},0)-byCity[a].reduce(function(s,x){return s+x.count},0);});
  for(var c=0;c<cities.length;c++){byCity[cities[c]].sort(function(a,b){return b.count-a.count});}
  maxCnt=0;
  for(var i=0;i<keys.length;i++){if(D[keys[i]].count>maxCnt)maxCnt=D[keys[i]].count;}
}

function barColor(n){
  var r=n/maxCnt;
  if(r>.5)return '#43a047';
  if(r>.2)return '#8377b7';
  if(r>.08)return '#fb8c00';
  return '#8e8ba5';
}

function renderKPI(){
  document.getElementById('kpi').innerHTML=
  '<div class="kpis">'+
  '<div class="kpi"><div class="n">'+fmt(totalStores)+'</div><div class="l">إجمالي المتاجر</div></div>'+
  '<div class="kpi"><div class="n">'+fmt(Object.keys(D).length)+'</div><div class="l">عدد الأحياء المغطاة</div></div>'+
  '<div class="kpi"><div class="n">'+fmt(Object.keys(byCity).length)+'</div><div class="l">عدد المدن</div></div>'+
  '<div class="kpi"><div class="n">'+fmtM(totalDebit)+'</div><div class="l">إجمالي المتبقي (ر.س)</div></div>'+
  '<div class="kpi"><div class="n">'+fmtM(totalPaid)+'</div><div class="l">إجمالي المدفوع (ر.س)</div></div></div>';
}

document.getElementById('charts').innerHTML='<div class="row2"><div class="card"><div class="card-b">'+

var curFilter='all',curSearch='',curType='all',curDebit='all',curSort='count';

function getFiltered(){
  var res=[];
  var cts=Object.keys(byCity);
  for(var ci=0;ci<cts.length;ci++){
    var city=cts[ci];var arr=byCity[city];
    for(var j=0;j<arr.length;j++){
      var d=arr[j];
      if(curFilter!=='all'&&d.city!==curFilter)continue;
      if(curType!=='all'){
        var hasType=false;
        for(var s=0;s<d.stores.length;s++){if(d.stores[s].type===curType){hasType=true;break;}}
        if(!hasType)continue;
      }
      if(curDebit!=='all'){
        var dd=Number(d.debit)||0;
        if(curDebit==='0'&&dd>0)continue;
        if(curDebit==='1-500'&&(dd<1||dd>500))continue;
        if(curDebit==='500-2000'&&(dd<500||dd>2000))continue;
        if(curDebit==='2000+'&&dd<2000)continue;
      }
      if(curSearch){var q=curSearch.toLowerCase();var match=d.district.toLowerCase().indexOf(q)>=0||d.city.toLowerCase().indexOf(q)>=0;if(!match){for(var s=0;s<d.stores.length;s++){if(d.stores[s].name.toLowerCase().indexOf(q)>=0){match=true;break}}}if(!match)continue;}
      res.push(d);
    }
  }
  if(curSort==='debit')res.sort(function(a,b){return b.debit-a.debit});
  else if(curSort==='paid')res.sort(function(a,b){return b.paid-a.paid});
  else if(curSort==='name')res.sort(function(a,b){return a.district.localeCompare(b.district,'ar')});
  else res.sort(function(a,b){return b.count-a.count});
  return res;
}

  for(var ti=0;ti<sortedTypes.length;ti++){var t=sortedTypes[ti];if(bizT.indexOf(t)<0)continue;typeOpts+='<option value="'+t+'" '+(curType===t?'selected':'')+'>'+(TYPE_LABELS[t]||t)+' ('+T[t]+')</option>';}

  for(var ti=0;ti<sortedTypes.length;ti++){var t=sortedTypes[ti];if(othT.indexOf(t)<0)continue;typeOpts+='<option value="'+t+'" '+(curType===t?'selected':'')+'>'+(TYPE_LABELS[t]||t)+' ('+T[t]+')</option>';}
  typeOpts+='</optgroup>';
  var debitOpts=[['all','كل المبالغ'],['0','بدون مديونية'],['1-500','1 - 500 ر.س'],['500-2000','500 - 2,000 ر.س'],['2000+','أكثر من 2,000 ر.س']];
  var debitSel='';
  for(var di=0;di<debitOpts.length;di++){debitSel+='<option value="'+debitOpts[di][0]+'" '+(curDebit===debitOpts[di][0]?'selected':'')+'>'+debitOpts[di][1]+'</option>';}

  var sortOpts=[['count','عدد المتاجر'],['debit','الأعلى مديونية'],['paid','الأعلى مدفوع'],['name','الحي (أ-ي)']];
  var sortSel='';
  for(var si=0;si<sortOpts.length;si++){sortSel+='<option value="'+sortOpts[si][0]+'" '+(curSort===sortOpts[si][0]?'selected':'')+'>'+sortOpts[si][1]+'</option>';}

  var activeTags='';
  if(curFilter!=='all')activeTags+='<span class="atag" onclick="window._F(\'all\')">'+curFilter+' <b>✕</b></span>';
  if(curType!=='all')activeTags+='<span class="atag" onclick="window._FT(\'all\')">'+(TYPE_LABELS[curType]||curType)+' <b>✕</b></span>';
  if(curDebit!=='all'){var dl={'0':'بدون مديونية','1-500':'1-500','500-2000':'500-2000','2000+':'2000+'};activeTags+='<span class="atag" onclick="window._FD(\'all\')">متبقي: '+dl[curDebit]+' <b>✕</b></span>';}
  if(curSort!=='count')activeTags+='<span class="atag" onclick="window._FS(\'count\')">ترتيب مختلف <b>✕</b></span>';

  var cards='';
  for(var i=0;i<filtered.length;i++){
    var d=filtered[i];var pct=(d.count/maxCnt*100).toFixed(0);var col=barColor(d.count);
    var storesHtml='';
    for(var s=0;s<d.stores.length;s++){var st=d.stores[s];
      var debitPart=st.debit>0?'<span class="d">⬆ '+fmtM(st.debit)+'</span>':'';
      var paidPart=st.paid>0?'<span class="p">✓ '+fmtM(st.paid)+'</span>':'';
      var delBtn=st._custom?'<button class="btn-del" title="حذف" onclick="event.stopPropagation();window._Del(\''+st._id+'\')">🗑</button>':'';
      var newBadge=st._custom?'<span class="badge-new">جديد</span>':'';
      storesHtml+='<div class="si"><div class="si-l"><span class="tb '+tc(st.type)+'">'+cln(st.type)+'</span><span class="nm" title="'+cln(st.name)+'">'+newBadge+cln(st.name)+'</span></div><div class="si-r">'+debitPart+paidPart+delBtn+'</div></div>';
    }
    cards+='<div class="dc" id="dc'+i+'" onclick="window._T('+i+')"><div class="dh"><div><div class="dn">'+cln(d.district)+'</div><div class="dc-city">'+cln(d.city)+'</div></div><div class="dbadge" style="background:'+col+'">'+d.count+'</div></div><div class="dbar"><div class="dbar-f" style="width:'+pct+'%;background:'+col+'"></div></div><div class="dfoot"><span>📊 '+d.stores.length+' متجر</span><span class="m p">💰 '+fmtM(d.paid)+'</span><span class="m d">⬆ '+fmtM(d.debit)+'</span></div><div class="dbody" onclick="event.stopPropagation()">'+storesHtml+'</div></div>';
  }

  var resultCount='<span class="rcount">'+filtered.length+' حي'+(hasFilters?' من '+Object.keys(D).length:'')+'</span>';

  document.getElementById('main').innerHTML='<div class="sec"><div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:16px"><div class="sec-h" style="margin:0"><div class="bar"></div>تفاصيل الأحياء '+resultCount+'</div><div style="display:flex;gap:8px"><button class="btn-add" onclick="window._M(true)">➕ إضافة متجر</button><button class="btn-exp" onclick="window._A()">📋 عرض الكل</button></div></div><div class="card fcard"><div class="fsearch"><input type="text" placeholder="بحث بالحي أو المدينة أو اسم المتجر..." value="'+curSearch+'" oninput="window._S(this.value)"></div>'+cityChips+'<div class="fdrops"><div class="fdrop"><label>🏪 النوع</label><select onchange="window._FT(this.value)">'+typeOpts+'</select></div><div class="fdrop"><label>💰 المتبقي</label><select onchange="window._FD(this.value)">'+debitSel+'</select></div><div class="fdrop"><label>📊 ترتيب</label><select onchange="window._FS(this.value)">'+sortSel+'</select></div></div>'+(hasFilters?'<div class="ftags"><span class="ftags-label">الفلاتر النشطة:</span>'+activeTags+'<button class="ftags-clear" onclick="window._FC()">مسح الكل</button></div>':'')+'</div><div class="dg">'+cards+'</div></div>';
}

window._F=function(c){curFilter=c;render()};
window._S=function(v){curSearch=v;render()};
window._FT=function(t){curType=t;render()};
window._FD=function(d){curDebit=d;render()};
window._FS=function(s){curSort=s;render()};
window._filterOpen=false;
window._TF=function(){window._filterOpen=!window._filterOpen;render()};
window._FC=function(){curFilter='all';curType='all';curDebit='all';curSort='count';window._filterOpen=true;render()};
window._T=function(i){var el=document.getElementById('dc'+i);if(el)el.classList.toggle('open')};
window._M=function(show){document.getElementById('modal').classList.toggle('show',show);if(show)document.getElementById('f_name').focus();};
window._A=function(){var all=document.querySelectorAll('.dc');var anyOpen=false;for(var i=0;i<all.length;i++){if(all[i].classList.contains('open')){anyOpen=true;break}}for(var i=0;i<all.length;i++){if(anyOpen)all[i].classList.remove('open');else all[i].classList.add('open');}};

window._Save=function(){
  var name=document.getElementById('f_name').value.trim();
  var city=document.getElementById('f_city').value.trim();
  var dist=document.getElementById('f_dist').value.trim();
  if(!name||!city||!dist){alert('يرجى تعبئة الاسم والمدينة والحي');return;}
  var store={
    _id:'c_'+Date.now()+'_'+Math.random().toString(36).substr(2,5),
    name:name,city:city,district:dist,
    phone:document.getElementById('f_phone').value.trim(),
    type:document.getElementById('f_type').value,
    paid:Number(document.getElementById('f_paid').value)||0,
    debit:Number(document.getElementById('f_debit').value)||0
  };
  customStores.push(store);
  document.getElementById('f_save_btn').textContent='⏳ جاري الحفظ...';
  document.getElementById('f_save_btn').disabled=true;
  saveToGitHub(customStores,function(){
    document.getElementById('f_name').value='';document.getElementById('f_city').value='';
    document.getElementById('f_dist').value='';document.getElementById('f_phone').value='';
    document.getElementById('f_paid').value='';document.getElementById('f_debit').value='';
    window._M(false);
    recalcAll();render();renderKPI();
    document.getElementById('f_save_btn').textContent='💾 حفظ';
    document.getElementById('f_save_btn').disabled=false;
  });
};

window._Del=function(id){
  if(!confirm('هل تريد حذف هذا المتجر؟'))return;
  customStores=customStores.filter(function(s){return s._id!==id});
  saveToGitHub(customStores,function(){recalcAll();render();renderKPI();});
};

document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)window._M(false);});

// Auto-refresh every 30s for the sales rep
setInterval(function(){
  fetch(GH_API,{headers:{'Authorization':'token '+GH_TOKEN,'Accept':'application/vnd.github.v3+json'}})
  .then(function(r){return r.json()})
  .then(function(data){
    if(data.content){
      var decoded=atob(data.content.replace(/\n/g,''));
      var newStores=JSON.parse(decoded);
      if(JSON.stringify(newStores)!==JSON.stringify(customStores)){
        customStores=newStores;ghSha=data.sha;
        recalcAll();render();renderKPI();
      }
    }
  }).catch(function(){});
},30000);

// INIT
recalcAll();renderKPI();render();
loadFromGitHub();
})();
</script>
</body>
</html>
