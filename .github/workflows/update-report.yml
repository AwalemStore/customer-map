name: Update Paftah Report

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - name: Update report
        env: { REWAA_EMAIL: info@paftah.com, REWAA_PASSWORD: ${{ secrets.REWAA_PASSWORD }} }
        run: node scripts/update-report.mjs
      - name: Fetch Q2 tax data
        env: { REWAA_EMAIL: info@paftah.com, REWAA_PASSWORD: ${{ secrets.REWAA_PASSWORD }} }
        run: node scripts/fetch-q2-tax.mjs
      - name: Fetch Q1 returns in Q2
        env: { REWAA_EMAIL: info@paftah.com, REWAA_PASSWORD: ${{ secrets.REWAA_PASSWORD }} }
        run: node scripts/fetch-q1-returns.mjs
      - name: Commit
        run: |
          git diff --quiet paftah-comprehensive-report.html || echo "changed=true" >> $GITHUB_OUTPUT
      - name: Push
        if: steps.git-check.outputs.changed == 'true'
        run: |
          git config user.name "Paftah Bot"
          git config user.email "bot@paftah.com"
          git add paftah-comprehensive-report.html
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
          git commit -m "auto: update + Q2 tax + Q1 returns - ${TIMESTAMP}"
          git push
