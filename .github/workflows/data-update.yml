name: Data Update
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Update report
        env: { REWAA_EMAIL: info@paftah.com, REWAA_PASSWORD: ${{ secrets.REWAA_PASSWORD }}, REWAA_DASH_PHONE: ${{ secrets.REWAA_DASH_PHONE }} }
        run: node scripts/update-report.mjs
      - name: Q2 tax
        env: { REWAA_EMAIL: info@paftah.com, REWAA_PASSWORD: ${{ secrets.REWAA_PASSWORD }}, REWAA_DASH_PHONE: ${{ secrets.REWAA_DASH_PHONE }} }
        run: node scripts/fetch-q2-tax.mjs
      - name: Q1 returns
        env: { REWAA_EMAIL: info@paftah.com, REWAA_PASSWORD: ${{ secrets.REWAA_PASSWORD }}, REWAA_DASH_PHONE: ${{ secrets.REWAA_DASH_PHONE }} }
        run: node scripts/fetch-q1-returns.mjs
      - name: Aging
        env: { REWAA_EMAIL: info@paftah.com, REWAA_PASSWORD: ${{ secrets.REWAA_PASSWORD }}, REWAA_DASH_PHONE: ${{ secrets.REWAA_DASH_PHONE }} }
        run: node scripts/fetch-aging.mjs
      - name: Analytics
        env: { REWAA_EMAIL: info@paftah.com, REWAA_PASSWORD: ${{ secrets.REWAA_PASSWORD }}, REWAA_DASH_PHONE: ${{ secrets.REWAA_DASH_PHONE }} }
        run: node scripts/customer-analytics.mjs
      - name: Dashboard
        env: { REWAA_EMAIL: info@paftah.com, REWAA_PASSWORD: ${{ secrets.REWAA_PASSWORD }}, REWAA_DASH_PHONE: ${{ secrets.REWAA_DASH_PHONE }} }
        run: node scripts/fetch-dashboard.mjs
      - name: Reports
        env: { REWAA_EMAIL: info@paftah.com, REWAA_PASSWORD: ${{ secrets.REWAA_PASSWORD }}, REWAA_DASH_PHONE: ${{ secrets.REWAA_DASH_PHONE }} }
        run: node scripts/fetch-reports.mjs || true
      - name: Expenses
        env: { REWAA_EMAIL: info@paftah.com, REWAA_PASSWORD: ${{ secrets.REWAA_PASSWORD }}, REWAA_DASH_PHONE: ${{ secrets.REWAA_DASH_PHONE }} }
        run: node scripts/fetch-expenses.mjs
      - name: Commit
        run: |
          git config user.name "Paftah Bot"
          git config user.email "bot@paftah.com"
          git add paftah-comprehensive-report.html
          git diff --staged --quiet || (git commit -m "auto: $(date -u +'%Y-%m-%d %H:%M')" && git push)
