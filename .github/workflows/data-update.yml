name: Data Update
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Find receipts
        env:
          REWAA_EMAIL: info@paftah.com
          REWAA_PASSWORD: ${{ secrets.REWAA_PASSWORD }}
        run: node scripts/find-receipts.mjs
