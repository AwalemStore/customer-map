name: Exp Dbg
on:
  workflow_dispatch:
jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - name: Debug
        env: { REWAA_PASSWORD: ${{ secrets.REWAA_PASSWORD }} }
        run: node scripts/debug-exp.mjs
